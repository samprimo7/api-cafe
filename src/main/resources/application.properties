# ----- Conexion a PostgreSQL -----
# Los valores por defecto funcionan con el docker-compose incluido.
# Se pueden sobrescribir con variables de entorno (ver docker-compose.yml).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/coffeedb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:coffee}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:coffee}
spring.datasource.driver-class-name=org.postgresql.Driver

# ----- JPA / Hibernate -----
# update: crea/actualiza las tablas segun las entidades (comodo para estudiar).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Cargar data.sql despues de que Hibernate cree las tablas
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ----- Servidor -----
server.port=8080

# ----- OAuth2 con GitHub -----
# El client-id y client-secret se obtienen registrando una OAuth App en GitHub:
#   https://github.com/settings/developers -> New OAuth App
# Authorization callback URL: http://localhost:8080/login/oauth2/code/github
#
# Se pasan via variables de entorno (mejor que hardcodearlas en el codigo).
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:rellenar}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:rellenar}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# ----- Roles -----
# Usernames de GitHub que tendran rol ADMIN. El resto son USER.
# Separados por coma. Ej: coffee.admin-users=samprimo7,otro-admin
coffee.admin-users=samprimo7,asamprimopaellasoft

# ----- Frontend Angular -----
# URL del frontend para CORS y para redirigir despues del login.
coffee.frontend-url=http://localhost:4200
